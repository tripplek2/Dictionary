<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dictionary App</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="Dict">
        <header>
            <h1>Wordbook</h1>
        </header>

        <form id="searchForm" aria-live="Word search">
            <input type="text" id="nputSearch" placeholder="Enter a word" aria-label="Word input" required>
        </form>

        <section id="result" class="result" aria-live="polite">
            <p>Search for word meaning.</p>
        </section>

    </div>
    
</body>
</html>
